<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxMark — Word-by-Word TTS Highlighter</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header>
    <div class="logo">
      <span class="logo-mark">▶</span>
      <span class="logo-text">VoxMark</span>
    </div>
    <p class="tagline">Read along as you listen.</p>
  </header>

  <main>

    <section class="input-section">
      <div class="section-label">01 — your text</div>
      <textarea
        id="text-input"
        spellcheck="false"
        placeholder="Paste or type anything here. A speech, a paragraph, a poem — VoxMark will read it word by word and highlight as it goes."
      >To be, or not to be, that is the question: Whether 'tis nobler in the mind to suffer the slings and arrows of outrageous fortune, or to take arms against a sea of troubles, and by opposing end them.</textarea>
      <div class="char-count"><span id="char-count">0</span> characters · <span id="word-count">0</span> words</div>
    </section>

    <section class="display-section">
      <div class="section-label">02 — read-along view</div>
      <div id="display-box" aria-live="polite" aria-label="Read-along text with word highlighting"></div>
    </section>

    <section class="controls-section">
      <div class="section-label">03 — controls</div>

      <div class="controls-row main-controls">
        <button class="btn-icon btn-play" id="btn-play" aria-label="Play">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn-icon btn-pause" id="btn-pause" disabled aria-label="Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn-icon btn-stop" id="btn-stop" disabled aria-label="Stop">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
        </button>

        <div class="progress-wrap">
          <div class="progress-bar"><div id="progress-fill"></div></div>
          <span id="status-text">Ready</span>
        </div>
      </div>

      <div class="controls-row sliders-row">
        <div class="slider-group">
          <label for="rate-slider">Speed <span id="rate-val">1.0×</span></label>
          <input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="1" />
        </div>
        <div class="slider-group">
          <label for="pitch-slider">Pitch <span id="pitch-val">1.0</span></label>
          <input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1" />
        </div>
        <div class="slider-group voice-group">
          <label for="voice-select">Voice</label>
          <select id="voice-select"><option>Loading…</option></select>
        </div>
      </div>
    </section>

    <div id="fallback-banner" class="fallback-banner" style="display:none;">
      ⚠ Word boundary events aren't supported in your browser — using estimated timing instead.
    </div>

  </main>

  <footer>
    <span>VoxMark</span>
    <span>Built with the Web Speech API · No data leaves your browser</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
